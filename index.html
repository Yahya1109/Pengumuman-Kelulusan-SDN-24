            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;

        }
        .container {
            background-color: rgba(255, 255, 255, 0.95);

        .main-title {

            font-size: 17px;
            line-height: 1.4;
        }

            font-size: 24px;
            font-weight: 800;
            color: #1d4ed8;
            text-transform: uppercase;
            display: block;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }
        .main-title .sub-title {
            font-size: 14px;
            color: #64748b;
            font-weight: 500;
            display: block;
            margin-top: 4px;
        }
        p { 
            color: #64748b; 
            font-size: 14px; 
            margin-bottom: 25px; 
            line-height: 1.5;
        }
        input[type="text"] {
            width: 100%;
            padding: 14px;
            margin: 10px 0 15px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
            text-align: center;
        }
        input[type="text"]:focus {
            border-color: #3b82f6;
            outline: none;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }
        button {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }
        button:hover { 
            background-color: #2563eb; 
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }
        button:active {
            transform: translateY(0);
        }
        #hasil {
            margin-top: 25px;
            padding: 20px;
            border-radius: 12px;
            display: none;
            text-align: left;
            line-height: 1.7;
            font-size: 14px;
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .lulus { background-color: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
        .tidak-lulus { background-color: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
        .tidak-ditemukan { background-color: #fffbeb; color: #92400e; border: 1px solid #fde68a; text-align: center !important; }
        
        .status-badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 8px;
            font-weight: 700;
            margin-top: 15px;
            font-size: 16px;
            letter-spacing: 0.5px;
        }
        .badge-lulus { background-color: #22c55e; color: white; box-shadow: 0 4px 10px rgba(34, 197, 94, 0.3); }
        .badge-gagal { background-color: #ef4444; color: white; box-shadow: 0 4px 10px rgba(239, 68, 68, 0.3); }
        
        /* Gaya khusus untuk mensejajarkan titik dua pada biodata */
        .data-row {
            display: flex;
            margin-bottom: 6px;
            border-bottom: 1px dashed rgba(0,0,0,0.05);
            padding-bottom: 6px;
        }
        .data-row:last-child {
            border-bottom: none;
        }
        .data-label {
            font-weight: 600;
            color: #475569;
            width: 135px;
            flex-shrink: 0;
        }
        .data-value {
            color: #0f172a;
            font-weight: 500;
        }
        .titik-dua {
            margin-right: 8px;
            color: #475569;
            font-weight: 600;
        }
    </style>
</head>

        function cekKelulusan() {
            const input = document.getElementById("nisnInput").value.trim();
            const hasilDiv = document.getElementById("hasil");
            
            if(input === "") {
                alert("Harap masukkan NISN terlebih dahulu!");
                return;
            }

            // Mencari siswa berdasarkan NISN
        const siswa = dataSiswa.find(s => s.nisn === input);

        hasilDiv.style.display = "block"; // Tampilkan kotak hasil

        if (siswa) {
            if (siswa.status === "LULUS") {
                hasilDiv.className = "lulus";
                hasilDiv.innerHTML = `
                    <div style="text-align: center; margin-bottom: 15px; font-weight: 700; font-size: 18px; color: #15803d;">Data Ditemukan</div>

                    <div class="data-row"><div class="data-label">Tempat, Tgl Lahir</div> <div class="titik-dua">:</div> <div class="data-value">${siswa.tempatLahir}, ${siswa.tanggalLahir}</div></div>
                    <div style="text-align: center; margin-top: 15px;">
                        <span class="status-badge badge-lulus">${siswa.status}</span>

                    <div class="data-row"><div class="data-label">Nama</div> <div class="titik-dua">:</div> <div class="data-value">${siswa.nama}</div></div>
